name: Deploy marketing site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/app/**'
      - 'dashboard/components/**'
      - 'dashboard/lib/**'
      - 'dashboard/public/**'
      - 'dashboard/next.config.ts'
      - 'dashboard/tailwind.config.ts'
      - 'dashboard/package.json'
      - 'dashboard/package-lock.json'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - run: npm ci

      - name: Stash dashboard, API and middleware (server-only)
        run: |
          mkdir -p ../.stash
          mv app/dashboard ../.stash/dashboard
          mv app/api ../.stash/api
          mv middleware.ts ../.stash/middleware.ts

      - name: Generate Prisma client (needed by lib/db imports)
        run: npx prisma generate

      - name: Build static export
        run: STATIC_EXPORT=1 npx next build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Restore stashed files
        if: always()
        run: |
          mv ../.stash/dashboard app/dashboard 2>/dev/null || true
          mv ../.stash/api app/api 2>/dev/null || true
          mv ../.stash/middleware.ts middleware.ts 2>/dev/null || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
